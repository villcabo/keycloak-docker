# Keycloak HA cluster on Docker Swarm — MULTI-HOST (3 nodes).
#
# One Keycloak replica per labeled host (max_replicas_per_node: 1), discovered
# via Infinispan jdbc-ping (peers register in the DB — no peer IPs needed).
# Traefik load-balances the 3 tasks. External PostgreSQL (set in .env).
#
# Prereqs (run once, from a Swarm manager):
#   docker network create -d overlay --attachable \
#     --opt com.docker.network.driver.mtu=1450 keycloak-net
#   docker node update --label-add keycloak=true <node-b1>
#   docker node update --label-add keycloak=true <node-b2>
#   docker node update --label-add keycloak=true <node-b3>
#
# Deploy:
#   docker stack deploy -c keycloak-stack.yml keycloak

networks:
  keycloak-net:
    external: true

x-keycloak-common: &keycloak_common
  image: quay.io/keycloak/keycloak:${KEYCLOAK_IMAGE_VERSION:-26.6.2}
  command: ["start"]
  networks:
    - keycloak-net
  environment:
    # Database (external — must be reachable from every Swarm node)
    KC_DB: postgres
    KC_DB_URL: ${DATABASE_URL}
    KC_DB_USERNAME: ${DATABASE_USERNAME}
    KC_DB_PASSWORD: ${DATABASE_PASSWORD}

    # Edge proxy: TLS terminates upstream, Traefik forwards X-Forwarded-* headers
    KC_PROXY_HEADERS: xforwarded
    KC_HTTP_ENABLED: "true"
    KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
    KC_HOSTNAME_STRICT: "true"

    KC_HEALTH_ENABLED: "true"
    KC_METRICS_ENABLED: "true"

    # Structured JSON logs to stdout — required for the Alloy/Loki pipeline to
    # parse `level` etc. as fields (see monitoring/).
    KC_LOG_CONSOLE_OUTPUT: json

    # Bootstrap admin (Keycloak 26+ env names)
    KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
    KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

    # Clustering: Infinispan over JGroups, peer discovery via DB table (JGROUPSPING).
    # jdbc-ping is the right stack for Swarm/multi-host: no multicast, no static IPs.
    KC_CACHE: ispn
    KC_CACHE_STACK: jdbc-ping

    # APPEND (not JAVA_OPTS) so we keep Keycloak's tuned GC/container defaults.
    # jgroups.bind.address: force JGroups onto the overlay interface (10.x).
    # Without it, JGroups binds the docker_gwbridge (172.x) — not routable
    # between hosts — and the cluster silently never forms. Adjust 10.* if your
    # overlay uses a custom IPAM subnet.
    JAVA_OPTS_APPEND: "-Xms512m -Xmx1024m -Djgroups.bind.address=match-address:10.*"
  # The image is distroless (bash, but no curl/wget) → probe :9000/health/ready
  # over bash /dev/tcp. This is REQUIRED for safe rolling upgrades: Swarm uses it
  # to know a new node is actually READY before draining the next old one.
  # ($$l escapes Compose variable interpolation so $l reaches the container.)
  healthcheck:
    test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/localhost/9000; printf "GET /health/ready HTTP/1.0\r\n\r\n" >&3; read -r l <&3; [[ "$$l" == *200* ]]']
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 120s

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmmode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=keycloak-net"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"      # public edge (an upstream LB/proxy terminates HTTPS)
      - "8080:8080"  # Traefik dashboard/API — diagnostic only
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - keycloak-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # needs the Swarm API / docker socket
      restart_policy:
        condition: any

  keycloak:
    <<: *keycloak_common
    stop_grace_period: 90s
    deploy:
      replicas: 3
      # Multi-host = 1 replica per node, so start-first has nowhere to place the
      # extra task → use stop-first. With parallelism 1 + the container healthcheck,
      # Swarm drains one node, waits for its replacement to be HEALTHY, then moves
      # on; the other 2 nodes keep serving throughout (no full outage).
      update_config:
        parallelism: 1
        order: stop-first
        delay: 15s
        monitor: 30s
        failure_action: pause
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.keycloak == true
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 768M
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME}`)"
        - "traefik.http.routers.keycloak.entrypoints=web"
        - "traefik.http.routers.keycloak.middlewares=keycloak-https,keycloak-retry"
        - "traefik.http.middlewares.keycloak-retry.retry.attempts=3"
        - "traefik.http.middlewares.keycloak-retry.retry.initialinterval=100ms"
        - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
        - "traefik.http.services.keycloak.loadbalancer.healthcheck.port=9000"
        - "traefik.http.services.keycloak.loadbalancer.healthcheck.path=/health/ready"
        - "traefik.http.services.keycloak.loadbalancer.healthcheck.interval=3s"
        - "traefik.http.services.keycloak.loadbalancer.healthcheck.timeout=2s"
        - "traefik.http.middlewares.keycloak-https.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.middlewares.keycloak-https.headers.customrequestheaders.X-Forwarded-Port=443"
