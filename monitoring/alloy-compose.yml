# Grafana Alloy — log shipper for Keycloak (Docker Compose mode).
#
# Single container per host (no mode: global — that's swarm-only).
# Shares config.alloy with alloy-stack.yml via bind-mount (NOT a Swarm config).
# Ships Keycloak JSON logs to an external Loki. Loki/Grafana are NOT here.
#
# Prerequisites:
#   - cp .env.example monitoring/.env (or set vars in environment)
#   - LOKI_REMOTE_URL is REQUIRED.
#   - HOST_NAME must be set (compose has no {{.Node.Hostname}} template).
#     Recommended: HOST_NAME=$(hostname) — add to monitoring/.env or set -a; . .env; set +a.
#
# Run from inside monitoring/ so ./config.alloy resolves correctly:
#   cd monitoring
#   set -a; . .env; set +a
#   docker compose -f alloy-compose.yml up -d
#
# Or from repo root:
#   set -a; . .env; set +a
#   HOST_NAME=$(hostname) docker compose -f monitoring/alloy-compose.yml up -d

services:
  alloy:
    image: grafana/alloy:v1.16.1
    # Alloy must read the Docker socket → root here. In hardened setups prefer
    # `group_add: ["<docker gid>"]` instead of root.
    user: root
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      SYSTEM_NAME: ${SYSTEM_NAME:-keycloak}
      ENV_NAME: ${ENV_NAME:-production}
      # Compose has no {{.Node.Hostname}} template — pass HOST_NAME explicitly.
      # bash sets HOSTNAME but it's not always exported; set it in .env or as
      # HOST_NAME=$(hostname) before starting. See prerequisites above.
      HOST_NAME: ${HOST_NAME:-${HOSTNAME}}
      LOKI_REMOTE_URL: ${LOKI_REMOTE_URL:?LOKI_REMOTE_URL is required}
      LOKI_TENANT: ${LOKI_TENANT:-keycloak}
      LOKI_USERNAME: ${LOKI_USERNAME:-}
      LOKI_PASSWORD: ${LOKI_PASSWORD:-}
      LOKI_TLS_INSECURE_SKIP_VERIFY: ${LOKI_TLS_INSECURE_SKIP_VERIFY:-false}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config.alloy:/etc/alloy/config.alloy:ro"   # bind-mount (not a Swarm config)
      - alloy_data:/var/lib/alloy/data
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

volumes:
  alloy_data:
